# HTTP 块配置
http {
    # 限流配置
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=10r/s;

    server {
        listen 81;
        server_name localhost;

        # 前端静态资源
        location / {
            root /Users/yaolilin/IdeaProjects/myblog/frontend/dist;
            try_files $uri $uri/ /index.html;
        }

        # SEO 文件
        location = /robots.txt {
            proxy_pass http://localhost:8081/api/robots.txt;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /sitemap.xml {
            proxy_pass http://localhost:8081/api/sitemap.xml;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 文章页由后端返回带正文的首屏 HTML，再由 React 接管
        location ~ ^/articles/ {
            proxy_pass http://localhost:8081/api/seo$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 图片静态资源（带缓存）
        location /static/images/ {
            alias /Users/yaolilin/IdeaProjects/myblog/server/static/images/;
            expires 30d;  # 缓存 30 天
            add_header Cache-Control "public, immutable";
            limit_req zone=static_limit burst=10;
        }

        # 附件和静态资源
        location /static/attachments/ {
            alias /Users/yaolilin/IdeaProjects/myblog/server/static/attachments/;

            # 根据文件类型设置缓存
            location ~* \.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt|md)$ {
                expires 7d;
                add_header Content-Disposition "attachment";
            }

            location ~* \.(zip|tar|gz|rar|7z)$ {
                expires 30d;
                add_header Content-Disposition "attachment";
            }

            location ~* \.(mp4|avi|mov|mkv|mp3|wav|ogg)$ {
                expires 7d;
            }

            limit_req zone=static_limit burst=5;
        }

        # 后端 API 代理
        location /api/ {
            proxy_pass http://localhost:8081;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 错误页面
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}

# 事件配置
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# 工作进程配置
worker_processes auto;
