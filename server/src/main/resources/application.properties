# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mysql123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

# JWT Configuration
app.jwt.secret=myblog-secret-key-please-change-this-in-production
# 7 days in milliseconds
app.jwt.expiration=604800000  

# Admin Password (BCrypt encoded - default: "admin")
app.admin.password=$2a$10$MqoKK/5vKGk91GKHOB.2wu0D1LT871T8Kae7jWlAybkE9NbpHKHoq

# File Paths
app.docs.path=/Users/yaolilin/IdeaProjects/myblog/docs
app.image.storage.path=/Users/yaolilin/IdeaProjects/myblog/server/static/images
app.attachment.storage.path=/Users/yaolilin/IdeaProjects/myblog/server/static/attachments
# 50MB
app.attachment.max.size=52428800  
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Attachment Storage Location (for server-managed files)
# Options: ROOT, CURRENT_FOLDER, SUBFOLDER, CUSTOM_PATH
app.attachment.storage.location=CURRENT_FOLDER
app.attachment.subfolder.name=attachments
app.attachment.custom.path=

# Logging
logging.level.com.blog.myblog=DEBUG
logging.level.org.springframework.web=INFO
